<!DOCTYPE html>
<html>
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ToDo">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fredoka&family=Montserrat&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:'Montserrat';
  background:#0f0f0f;
  color:white;
  margin:0;
  overflow-x:hidden;
  transition:0.3s;

  /* 🔥 TEXT SIZE SYSTEM */
  --text-size:16px;
}
body.light{background:#f9f9f9;color:#000;color-scheme:light;}
body:not(.light){color-scheme:dark;}

.container{max-width:1100px;margin:auto;padding:15px;}
h1{text-align:center;font-family:'Fredoka';}

/* NAV */
.top-nav{display:flex;gap:10px;margin:15px 0;}
.top-nav button{
  flex:1;padding:16px;border:none;border-radius:12px;
  background:#5bc0de;color:white;
  transition:0.25s;
}
.top-nav button:hover{transform:scale(1.05);}

/* PAGE ANIMATION */
.page{
  opacity:0;
  transform:translateY(10px);
  pointer-events:none;
  position:absolute;
  width:100%;
  transition:0.3s;
}
.page.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
  position:relative;
  overflow-x:hidden;
}

/* INPUT */
.input-group{display:flex;flex-direction:column;gap:10px;}
input,select,textarea,button{
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:calc(var(--text-size) - 1px);
}
#addTaskBtn{background:#4CAF50;color:white;}

/* FILTER */
.filter-section{
  margin-top:15px;
  background:#1a1a1a;
  padding:12px;
  border-radius:16px;
}
body.light .filter-section{background:#e0e0e0;}
.filter-title{
  font-family:'Fredoka';
  margin-bottom:8px;
  font-size:calc(var(--text-size) + 2px);
}
.filter-row{display:flex;gap:10px;}
.filter-row input{flex:1;}

/* SECTIONS */
.sections{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:15px;
  margin-top:10px;
  align-items:start;
}
.section{
  flex:1;
  background:#1a1a1a;
  border-radius:16px;
  padding:12px;
  min-width:0;

  max-height:65vh;

  overflow-y:auto;
  overflow-x:auto;
}
body.light .section{
  background:#ffffff;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.section.high{border-top:4px solid red;}
.section.medium{border-top:4px solid gold;}
.section.low{border-top:4px solid limegreen;}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  font-family:'Fredoka';
  font-size:calc(var(--text-size) + 2px);
}

/* DROPDOWN FIX */
.section-content{
  display:none;
}

.section.open .section-content{
  display:block;
}

/* TASK */
ul{padding:0;}
li{
  list-style:none;
  background:#2a2a2a;
  margin:8px 0;
  padding:14px;
  border-radius:12px;
  animation:fadeIn 0.2s ease;
}
body.light li{
  background:#ffffff;
  border:1px solid #ddd;
}

/* Completed after deadline — "delayed" */
li.delayed{
  border:2px solid #ff4444;
  box-shadow:0 0 14px rgba(255,68,68,0.22);
  background:linear-gradient(145deg, rgba(50,22,22,0.55), rgba(35,18,18,0.4));
}
body.light li.delayed{
  background:#fff5f5;
  border:2px solid #e53935;
  box-shadow:0 2px 12px rgba(229,57,53,0.18);
}
li.delayed .task-top textarea{
  border-color:#ff5252;
  color:#ffe0e0;
}
body.light li.delayed .task-top textarea{
  border-color:#c62828;
  color:#1a1a1a;
  background:#fff8f8;
}
li.delayed .task-top textarea:focus{
  outline:none;
  border-color:#ff1744;
  box-shadow:0 0 0 3px rgba(255,23,68,0.35);
}
li.delayed .date-text{
  color:#ffab91;
  opacity:1;
}
body.light li.delayed .date-text{
  color:#bf360c;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(6px);}
  to{opacity:1;transform:translateY(0);}
}

li.done textarea{
  text-decoration:line-through;
  opacity:0.6;
}

.task-top{
  display:flex;
  gap:10px;
  align-items:flex-start;
  width:100%;
  min-width:0;
}

.task-top input[type="checkbox"]{
  flex-shrink:0;
  margin-top:4px;
}

.task-top textarea{
  min-width:0;
  flex:1;
  border:2px solid #ffffff;
  border-radius:10px;
  padding:10px 12px;
  background:rgba(0,0,0,0.25);
  color:inherit;
}
body.light .task-top textarea{
  border:2px solid rgba(0,0,0,0.5);
  background:#fafafa;
}
.task-top textarea:focus{
  outline:none;
  border-color:#4FC3F7;
  box-shadow:0 0 0 3px rgba(79,195,247,0.45);
}
body.light .task-top textarea:focus{
  border-color:#0288d1;
  box-shadow:0 0 0 3px rgba(2,136,209,0.25);
}
textarea{
  flex:1;
  font-size:var(--text-size);
  background:transparent;
  color:inherit;
}

.task-bottom{
  display:flex;
  flex-wrap:wrap;
  align-items:stretch;
  gap:10px;
  margin-top:10px;
  width:100%;
  min-width:0;
}

.task-bottom input[type="date"]{
  flex:1 1 11rem;
  min-width:11rem;
  max-width:100%;
  border:1px solid rgba(255,255,255,0.45);
  background:rgba(255,255,255,0.06);
  color:inherit;
}

.task-bottom select{
  flex:1 1 9.5rem;
  min-width:9.5rem;
  max-width:100%;
  border:1px solid rgba(255,255,255,0.45);
  background:rgba(255,255,255,0.06);
  color:inherit;
}

body.light .task-bottom input[type="date"],
body.light .task-bottom select{
  border:1px solid rgba(0,0,0,0.28);
  background:#fff;
}

  textarea{
  width:100%;
  resize:vertical;
  overflow-x:hidden;
}

.delete-btn{
  background:red;
  width:40px;height:40px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;
}

.date-text{
  font-size:calc(var(--text-size) - 3px);
  margin-top:5px;
  opacity:0.8;
  text-decoration:none !important;
}

/* CHART */
.chart-section{
  margin-top:15px;
  background:#1a1a1a;
  border-radius:16px;
  padding:10px;
}
/* 🔥 SETTINGS FIX */
#settingsPage{
  max-width:400px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.setting-group{
  display:flex;
  flex-direction:column;
  gap:6px;
}

#settingsPage select{
  width:100%;
  margin-top:6px;
}
body.light .chart-section{background:#e0e0e0;}
.chart-container{height:250px;}
.pie-chart-shell{
  position:relative;
  width:100%;
  max-width:320px;
  margin:12px auto 0;
  aspect-ratio:1;
  min-height:240px;
}

.pie-chart-shell canvas{
  display:block;
  width:100% !important;
  height:100% !important;
}

.report-layout{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:clamp(28px,5vw,56px);
  margin-top:20px;
  width:100%;
  overflow-x:hidden;
}

.report-left{
  flex:1 1 360px;
  max-width:480px;
  min-width:0;
}

.report-panel{
  background:#1a1a1a;
  border-radius:16px;
  padding:22px 20px 24px;
  border:1px solid rgba(255,255,255,0.06);
}

body.light .report-panel{
  background:#ffffff;
  border:1px solid #e0e0e0;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}

.report-left-inner{
  text-align:center;
}

#monthlyTitle{
  font-family:'Fredoka',sans-serif;
  font-size:clamp(28px,4vw,40px);
  font-weight:700;
  margin:0 0 8px;
  line-height:1.15;
}

.monthly-status{
  margin:0 auto 16px;
  opacity:0.9;
  font-size:calc(var(--text-size) + 1px);
  max-width:28rem;
}

.month-select{
  width:100%;
  max-width:280px;
  margin:0 auto 20px;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:#2a2a2a;
  color:inherit;
  font-size:calc(var(--text-size));
}

body.light .month-select{
  border:1px solid rgba(0,0,0,0.15);
  background:#fff;
}

.report-pie-legend{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px 20px;
  margin-top:18px;
  font-size:calc(var(--text-size) - 1px);
  opacity:0.95;
}

.report-legend-item{
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.report-legend-item .dot{
  width:10px;
  height:10px;
  border-radius:50%;
  flex-shrink:0;
}
.dot-completed{background:#76d275;}
.dot-missed{background:#ff3b30;}
.dot-late{background:#ffda5c;}

.report-right{
  flex:1 1 280px;
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  padding:12px 0 0 8px;
}

.report-main-heading{
  font-family:'Fredoka',sans-serif;
  font-size:clamp(32px,5vw,52px);
  font-weight:800;
  margin:0 0 20px;
  line-height:1.1;
  letter-spacing:-0.02em;
  text-align:left;
}

#reportStats{
  font-family:'Montserrat',sans-serif;
  font-size:clamp(18px,2.8vw,28px);
  font-weight:500;
  line-height:1.75;
  margin:0;
  text-align:left;
}

@media(max-width:820px){
  .report-layout{
    flex-direction:column;
    align-items:stretch;
  }
  .report-right{
    padding-left:0;
    padding-top:16px;
  }
}
#advancedTextToggle:hover{
  opacity:1;
  text-decoration:underline;
}
#advancedTextToggle{
  color:white;
  margin-top:8px;
  cursor:pointer;
  font-size:13px;
}

body.light #advancedTextToggle{
  color:black;
}
  /* 🔥 ADVANCED BOX */
#advancedTextPanel{
  background:#1a1a1a;
  padding:10px;
  border-radius:12px;
}

body.light #advancedTextPanel{
  background:#ffffff;
  border:1px solid #ccc;
}
  /* 🔥 SLIDER FIX */
#textSizeSlider{
  width:100%;
  accent-color:#4FC3F7; /* blue like your buttons */
}

body.light #textSizeSlider{
  accent-color:#4FC3F7;
}
  @media(max-width:900px){
  .sections{
    grid-template-columns:1fr;
  }
}
  @media(max-width:600px){

  .task-bottom{
    flex-direction:column;
  }

  .task-bottom select,
  .task-bottom input{
    width:100%;
    max-width:100%;
  }

}
</style>
</head>

<body>

<div class="container">

<h1 id="title"></h1>

<div class="top-nav">
<button id="navTasks"></button>
<button id="navReports"></button>
<button id="navSettings"></button>
</div>

<!-- TASK PAGE -->
<div id="tasksPage" class="page active">

<div class="input-group">
<input id="taskInput">
<input id="deadlineInput" type="date">
<select id="priorityInput"></select>
<button id="addTaskBtn"></button>
</div>

<div class="filter-section">
<div class="filter-title" id="filterTitle"></div>

<div class="filter-row">
<input type="date" id="fromDate">
<input type="date" id="toDate">
</div>

<!-- 🔥 NEW FILTER RESULTS -->
<div id="filterResults" style="margin-top:10px;"></div>

</div>

<div class="sections" id="sections"></div>

<div class="chart-section section">
<div class="section-header" onclick="toggleChart()">
<span id="chartTitle"></span>
</div>
<div class="section-content">

<div style="display:flex;gap:15px;margin-bottom:10px;">
<span style="color:limegreen;">● Completed</span>
<span style="color:red;">● Missed</span>
<span style="color:gold;">● Late</span>
</div>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

</div>
</div>

</div>

<!-- REPORT PAGE -->
<div id="reportsPage" class="page">

<div class="report-layout">

  <div class="report-left">
    <div class="report-panel">
      <div class="report-left-inner">
        <h2 id="monthlyTitle"></h2>
        <p id="monthlyStatus" class="monthly-status"></p>
        <select id="monthSelect" class="month-select"></select>
        <div class="pie-chart-shell">
          <canvas id="pieChart"></canvas>
        </div>
        <div class="report-pie-legend" id="reportPieLegend">
          <span class="report-legend-item"><span class="dot dot-completed"></span><span id="legCompleted"></span></span>
          <span class="report-legend-item"><span class="dot dot-missed"></span><span id="legMissed"></span></span>
          <span class="report-legend-item"><span class="dot dot-late"></span><span id="legLate"></span></span>
        </div>
      </div>
    </div>
  </div>

  <div class="report-right">
    <h1 id="monthlyReportHeading" class="report-main-heading"></h1>
    <div id="reportStats"></div>
  </div>

</div>
</div>

<!-- SETTINGS -->
<div id="settingsPage" class="page">
<div class="setting-group">
<label id="themeLabel"></label>
<select id="themeSelect">
<option value="dark">🌙 Dark</option>
<option value="light">☀️ Light</option>
</select>
</div>

<div class="setting-group">
<label id="textSizeLabel"></label>

<select id="textSizeSelect">
<option value="low">Small</option>
<option value="medium">Medium</option>
<option value="high">Large</option>
</select>

<div id="advancedTextToggle" style="font-size:13px;margin-top:6px;cursor:pointer;"></div>

<div id="advancedTextPanel" style="display:none;margin-top:10px;">
<div style="display:flex;align-items:center;gap:8px;">
<span style="font-size:12px;">A</span>
<input type="range" id="textSizeSlider" min="12" max="24" value="16">
<span style="font-size:18px;">A</span>
</div>

<div id="textSizeValue" style="font-size:12px;margin-top:4px;">
16px
</div>
</div>

</div>

<div class="setting-group">
<label id="langLabel"></label>
<select id="langSelect">
<option value="en">🇺🇸 English</option>
<option value="vi">🇻🇳 Vietnamese</option>
</select>
</div>
</div>

</div>

<script>
console.log("App starting - Firebase removed for local development");

let tasks=[];
let chart,pieChart;
let openSections={high:false,medium:false,low:false,chart:false};
let currentLang=localStorage.getItem("lang")||"en";
let textSize = localStorage.getItem("textSize") || "medium";

/* LANGUAGE */
const lang={
en:{
title:"📋 My To-Do List",
tasks:"📋 Tasks",
reports:"📊 Reports",
settings:"⚙️ Settings",
add:"➕ Add Task",
enter:"Enter task",
filter:"📅 Filter Tasks",
chart:"📊 Weekly Progress",
monthly:"📊 Monthly Report",
monthlyReportHeading:"Monthly Report:",
statCompleted:"Tasks Completed - ",
statMissed:"Tasks Missed - ",
statDelayed:"Tasks Delayed - ",
statusGood:"You did well this month.",
statusOkay:"You did okay this month.",
statusBad:"You did bad this month.",
pieCompleted:"Completed",
pieMissed:"Missed",
pieDelayed:"Delayed",
legendCompleted:"Completed",
legendMissed:"Missed",
legendLate:"Late",
theme:"Theme - 🌗",
lang:"Language - 🌏",
created:"Created on",
textSize:"Text Size - 🔤",
advanced:"Advanced"
},
vi:{
title:"📋 Danh sách công việc",
tasks:"📋 Nhiệm vụ",
reports:"📊 Báo cáo",
settings:"⚙️ Cài đặt",
add:"➕ Thêm nhiệm vụ",
enter:"Nhập nhiệm vụ",
filter:"📅 Lọc nhiệm vụ",
chart:"📊 Tiến độ tuần",
monthly:"📊 Báo cáo tháng",
monthlyReportHeading:"Báo cáo tháng:",
statCompleted:"Hoàn thành - ",
statMissed:"Trễ hạn (missed) - ",
statDelayed:"Hoàn thành trễ - ",
statusGood:"Bạn làm tốt trong tháng này.",
statusOkay:"Bạn làm tạm ổn trong tháng này.",
statusBad:"Bạn cần cố gắng hơn trong tháng này.",
pieCompleted:"Hoàn thành",
pieMissed:"Trễ hạn",
pieDelayed:"Trễ nộp",
legendCompleted:"Hoàn thành",
legendMissed:"Trễ hạn",
legendLate:"Trễ",
theme:"Giao diện - 🌗",
lang:"Ngôn ngữ - 🌏",
created:"Tạo lúc",
textSize:"Kích thước chữ - 🔤",
advanced:"Nâng cao"
}
};

function applyLang(){
  let t=lang[currentLang];
  document.getElementById("title").textContent=t.title;
  document.getElementById("navTasks").textContent=t.tasks;
  document.getElementById("navReports").textContent=t.reports;
  document.getElementById("navSettings").textContent=t.settings;
  document.getElementById("addTaskBtn").textContent=t.add;
  document.getElementById("taskInput").placeholder=t.enter;
  document.getElementById("filterTitle").textContent=t.filter;
  document.getElementById("chartTitle").textContent=t.chart;
  document.getElementById("themeLabel").textContent=t.theme;
  document.getElementById("langLabel").textContent=t.lang;
  document.getElementById("advancedTextToggle").textContent = t.advanced;
  document.getElementById("textSizeLabel").textContent = t.textSize;
  document.getElementById("monthlyReportHeading").textContent = t.monthlyReportHeading;
  document.getElementById("legCompleted").textContent = t.legendCompleted;
  document.getElementById("legMissed").textContent = t.legendMissed;
  document.getElementById("legLate").textContent = t.legendLate;

  document.getElementById("priorityInput").innerHTML=`
  <option value="high">🔴 HIGH</option>
  <option value="medium">🟡 MEDIUM</option>
  <option value="low">🟢 LOW</option>`;
  if(typeof pieChart!=="undefined"&&pieChart){
    try{generateMonthly();}catch(e){}
  }
}

function applyTextSize(){
  let sizeMap = {
    low: "14px",
    medium: "16px",
    high: "18px"
  };

  document.body.style.setProperty("--text-size", sizeMap[textSize]);
}

/* NAV */
document.getElementById("navTasks").onclick=()=>switchPage("tasksPage");
document.getElementById("navReports").onclick=()=>switchPage("reportsPage");
document.getElementById("navSettings").onclick=()=>switchPage("settingsPage");

function switchPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* CHART */
function initCharts(){
chart=new Chart(document.getElementById("chart"),{
  type:"bar",
  data:{
    labels:["Completed","Missed","Late"],
    datasets:[{
      label:"Tasks",
      data:[0,0,0],
      backgroundColor:["limegreen","red","gold"]
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    animation:{
      duration:600,
      easing:"easeOutQuart"
    },
    plugins:{
      legend:{
        display:false
      },
      tooltip:{
        callbacks:{
          label:(ctx)=> `${ctx.label}: ${ctx.raw}`
        }
      }
    },
    scales:{
      y:{
        beginAtZero:true,
        ticks:{precision:0}
      }
    }
  }
});
pieChart = new Chart(document.getElementById("pieChart"),{
  type:"doughnut",
  data:{
    labels:["Completed","Missed","Delayed"],
    datasets:[{
      data:[0,0,0],
      backgroundColor:["#76d275","#ff3b30","#ffda5c"],
      borderColor:"#121212",
      borderWidth:2,
      hoverOffset:4
    }]
  },
options:{
  responsive:true,
  maintainAspectRatio:false,
  cutout:"52%",
  layout:{padding:12},
  plugins:{
      legend:{
        display:false
      }
    }
  }
});
}

function updateChart(){
  if (!chart) return;
  let completed=0, missed=0, late=0;
  let now=new Date();

  tasks.forEach(t=>{
    let hasDeadline = t.deadline;
    let d = hasDeadline ? new Date(t.deadline) : null;

    if(t.done){
      if(hasDeadline && new Date(t.completedAt) > d){
        late++;
      } else {
        completed++;
      }
    } else if(hasDeadline && d < now){
      missed++;
    }
  });

  chart.data.datasets[0].data=[completed, missed, late];

  chart.options.scales.y.max = tasks.length + 1;

  chart.update();
}

/* MONTHLY */
function generateMonthly(){
let months={};

tasks.forEach(t=>{
if(!t.deadline)return;
let m=t.deadline.slice(0,7);
if(!months[m])months[m]=[];
months[m].push(t);
});

let select=document.getElementById("monthSelect");
select.innerHTML="";

Object.keys(months).sort().reverse().forEach(m=>{
let opt=document.createElement("option");
opt.value=m;
opt.textContent=m;
select.appendChild(opt);
});

if(!select.value) return;

let [year, month] = select.value.split("-");

const monthNames = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

document.getElementById("monthlyTitle").textContent =
`${monthNames[parseInt(month)-1]} ${year}`;
let data=[0,0,0];
let statusText = "";
months[select.value].forEach(t=>{
let d=new Date(t.deadline);
if(t.done){
if(new Date(t.completedAt)>d)data[2]++;
else data[0]++;
}else if(d<new Date())data[1]++;
});
if(data[0] >= data[1] && data[0] >= data[2]){
  statusText = lang[currentLang].statusGood;
}
else if(data[2] >= data[0] && data[2] >= data[1]){
  statusText = lang[currentLang].statusOkay;
}
else{
  statusText = lang[currentLang].statusBad;
}

document.getElementById("monthlyStatus").textContent = statusText;
pieChart.data.datasets[0].data=data;
pieChart.data.datasets[0].borderColor=document.body.classList.contains("light")?"#e8e8e8":"#121212";
pieChart.update();
const R=lang[currentLang];
document.getElementById("reportStats").innerHTML = `
${R.statCompleted}${data[0]}<br>
${R.statMissed}${data[1]}<br>
${R.statDelayed}${data[2]}
`;
}

/* FILTER */
function getFilteredTasks(){
  let from = document.getElementById("fromDate").value;
  let to = document.getElementById("toDate").value;

  let fromDate = from ? new Date(from) : null;
  let toDate = to ? new Date(to) : null;

  return tasks.filter(t=>{
    if(!t.deadline) return false;

    let taskDate = new Date(t.deadline);

    if (fromDate && taskDate < fromDate) return false;

if (toDate) {
  let end = new Date(toDate);
  end.setHours(23,59,59,999);
  if (taskDate > end) return false;
}

    return true;
  });
}

function renderFilterPreview(){
  let container = document.getElementById("filterResults");
  container.innerHTML = "";

  let from = document.getElementById("fromDate").value;
  let to = document.getElementById("toDate").value;

  if(!from && !to){
    container.innerHTML = "";
    return;
  }

  let filtered = getFilteredTasks();

  filtered.forEach(t=>{
    let realTask = tasks.find(task => task.createdAt === t.createdAt);

    let div = document.createElement("div");

    div.style.background =
      document.body.classList.contains("light")
        ? "#ffffff"
        : "#2a2a2a";
    div.style.padding = "12px";
    div.style.borderRadius = "12px";
    div.style.marginBottom = "8px";

    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;">
        <span>${t.text}</span>

        <span style="
          background:${realTask && realTask.done ? "limegreen" : "#555"};
          padding:3px 8px;
          border-radius:8px;
          font-size:12px;
        ">
          ${realTask && realTask.done ? "DONE" : "TODO"}
        </span>
      </div>

      <div style="margin-top:5px;font-size:13px;">
        📅 ${t.deadline}
      </div>
    `;

    container.appendChild(div);
  });
}

/* RENDER */
function render(){
let sections=document.getElementById("sections");
sections.innerHTML="";

let filtered = tasks;
let groups={high:[],medium:[],low:[]};

filtered.forEach(t=>groups[t.priority].push({...t,index:tasks.indexOf(t)}));

if(tasks.length===0){
  sections.innerHTML = `
    <div style="
      opacity:0.7;
      padding:20px;
      text-align:center;
      grid-column:1 / -1;
    ">
      No tasks yet.
    </div>
  `;
} else {
Object.keys(groups).forEach(level=>{
  console.log(level, groups[level].length);
let list=groups[level];
// 🔥 AUTO SORT
list.sort((a, b) => {
  // 1. incomplete first
  if (a.done !== b.done) return a.done - b.done;

  // 2. tasks WITH deadlines come first
  if (!a.deadline && b.deadline) return 1;
  if (a.deadline && !b.deadline) return -1;

  // 3. sort by deadline
  if (a.deadline && b.deadline) {
    return new Date(a.deadline) - new Date(b.deadline);
  }

  return 0;
});
let done=list.filter(t=>t.done).length;

let section=document.createElement("div");
section.className=`section ${level} ${openSections[level]?"open":""}`;

let percent = list.length ? (done / list.length) * 100 : 0;

section.innerHTML=`
<div class="section-header" onclick="toggleSection('${level}')">
<span>${level.toUpperCase()}</span>

<div style="
  flex:1;
  margin:0 10px;
  background:#333;
  border-radius:10px;
  height:8px;
  overflow:hidden;
">
  <div style="
    width:${percent}%;
    height:100%;
    background:limegreen;
    transition:0.3s;
  "></div>
</div>

<span>${done}/${list.length}</span>
</div>

<div class="section-content"><ul></ul></div>`;

sections.appendChild(section);

let ul=section.querySelector("ul");

list.forEach(t=>{
let li=document.createElement("li");
if(t.done) li.classList.add("done");
if(t.done&&t.deadline&&t.completedAt&&new Date(t.completedAt)>new Date(t.deadline)){
  li.classList.add("delayed");
}

li.innerHTML=`
<div class="task-top">
<input type="checkbox" ${t.done?"checked":""} onclick="toggle(${t.index})">
<textarea onchange="edit(${t.index},this.value)">${t.text}</textarea>
<button class="delete-btn" onclick="del(${t.index})">❌</button>
</div>

<div class="task-bottom">
<input type="date" value="${t.deadline||''}" onchange="updateDate(${t.index},this.value)">
<select onchange="updatePriority(${t.index},this.value)">
<option value="high" ${t.priority === "high" ? "selected" : ""}>🔴 HIGH</option>
<option value="medium" ${t.priority === "medium" ? "selected" : ""}>🟡 MEDIUM</option>
<option value="low" ${t.priority === "low" ? "selected" : ""}>🟢 LOW</option>
</select>
</div>

<div class="date-text">
${t.deadline?"📅 "+t.deadline:""}
${t.completedAt?" | ✅ "+t.completedAt.split("T")[0]:""}
<br>
${t.createdAt?lang[currentLang].created+": "+t.createdAt.split("T")[0]:""}
</div>`;

ul.appendChild(li);
});
});
}

document.querySelector(".chart-section").classList.toggle("open",openSections.chart);

if(chart && chart.data){
  updateChart();
}
generateMonthly();
applyLang();

renderFilterPreview();
}

/* ACTIONS */
function toggle(i){
  tasks[i].done = !tasks[i].done;

  tasks[i].completedAt = tasks[i].done
    ? new Date().toISOString()
    : null;

  save();

  render();

  requestAnimationFrame(() => {
    updateChart();
  });
}

function del(i){tasks.splice(i,1);save();render();}
function edit(i,v){tasks[i].text=v;save();}
function updateDate(i,v){tasks[i].deadline=v;save();render();}
function updatePriority(i,v){tasks[i].priority=v;save();render();}

/* ADD */
document.getElementById("addTaskBtn").onclick=()=>{
let t=document.getElementById("taskInput");
let d=document.getElementById("deadlineInput");
let p=document.getElementById("priorityInput");

if(!t.value.trim())return;

tasks.push({
text:t.value,
deadline:d.value,
priority:p.value,
done:false,
completedAt:null,
createdAt:new Date().toISOString()
});

t.value="";d.value="";
save();
render();
updateChart();
};

document.getElementById("taskInput").addEventListener("keypress", e=>{
  if(e.key==="Enter"){
    document.getElementById("addTaskBtn").click();
  }
});

/* TOGGLE */
function toggleSection(level){
openSections[level]=!openSections[level];
render();
}

function toggleChart(){
openSections.chart=!openSections.chart;
render();
}

/* THEME */
document.getElementById("themeSelect").onchange=e=>{
  localStorage.setItem("theme", e.target.value);
  document.body.classList.toggle("light",e.target.value==="light");
  if(typeof pieChart!=="undefined"&&pieChart&&pieChart.data&&pieChart.data.datasets[0]){
    pieChart.data.datasets[0].borderColor=e.target.value==="light"?"#e8e8e8":"#121212";
    pieChart.update();
  }
  renderFilterPreview();
};

/* LANGUAGE */
document.getElementById("langSelect").onchange=e=>{
currentLang=e.target.value;
localStorage.setItem("lang",currentLang);
applyLang();
render();
};

const textSizeEl = document.getElementById("textSizeSelect");

if (textSizeEl) {
  textSizeEl.onchange = e => {
    textSize = e.target.value;
    localStorage.setItem("textSize", textSize);
    applyTextSize();
  };
}

/* STORAGE */
function save(){
  localStorage.setItem("tasks_v2", JSON.stringify(tasks));
}

function load(){
  let data = localStorage.getItem("tasks_v2");

  if(!data){
    data = localStorage.getItem("tasks");
  }

  try{
    tasks = JSON.parse(data) || [];
  }catch{
    tasks = [];
  }

  tasks = tasks.map(t => ({
    text: t.text || "",
    deadline: t.deadline || "",
    priority: t.priority || "low",
    done: t.done || false,
    completedAt: t.completedAt || null,
    createdAt: t.createdAt || new Date().toISOString()
  }));
}

load();
try {
  initCharts();
} catch (e) {
  console.log("chart failed", e);
}

const savedTheme = localStorage.getItem("theme") || "dark";
document.getElementById("themeSelect").value = savedTheme;
document.body.classList.toggle(
  "light",
  savedTheme === "light"
);

document.getElementById("monthSelect").addEventListener("change", generateMonthly);

applyLang();
applyTextSize();
render();

["fromDate","toDate"].forEach(id=>{
  document.getElementById(id).addEventListener("input", render);
});

document.getElementById("textSizeSelect").value = textSize;

// 🔥 ADVANCED TEXT SIZE
const advToggle = document.getElementById("advancedTextToggle");
const advPanel = document.getElementById("advancedTextPanel");
const slider = document.getElementById("textSizeSlider");
const valueText = document.getElementById("textSizeValue");

advToggle.onclick = () => {
  advPanel.style.display = advPanel.style.display === "none" ? "block" : "none";
};

const savedPx = localStorage.getItem("textSizePx");
if(savedPx){
  document.body.style.setProperty("--text-size", savedPx + "px");
  slider.value = savedPx;
  valueText.textContent = savedPx + "px";
}

slider.oninput = () => {
  let size = slider.value;

  document.body.style.setProperty("--text-size", size + "px");
  valueText.textContent = size + "px";

  localStorage.setItem("textSizePx", size);
};

console.log("App fully loaded");
</script>
</body>
</html>
